name: CI-CD Flask Docker to Azure ACR and ACI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: flask-entregable4
  CONTAINER_NAME: aci-flask-entregable4
  LOCATION: westeurope
  PORT: 5000

jobs:
  build-test-push-deploy:
    name: Build, test, push and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with pytest
        run: pytest -q

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Docker image
        run: |
          IMAGE_SHA="${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          IMAGE_LATEST="${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"

          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .

          echo "IMAGE_SHA=$IMAGE_SHA" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=$IMAGE_LATEST" >> "$GITHUB_ENV"

      - name: Run tests inside the Docker image
        run: |
          docker run --rm "$IMAGE_SHA" python -m pytest -q

      - name: Run container smoke test
        run: |
          docker run -d --name flask-test -p 5000:5000 "$IMAGE_SHA"
          sleep 5
          curl --fail http://localhost:5000/
          curl --fail http://localhost:5000/health
          docker logs flask-test
          docker stop flask-test
          docker rm flask-test

      - name: Push Docker image to Azure Container Registry
        run: |
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Deploy to Azure Container Instances
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ secrets.RESOURCE_GROUP }}
          name: ${{ env.CONTAINER_NAME }}
          image: ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          registry-login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          registry-username: ${{ secrets.REGISTRY_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_PASSWORD }}
          dns-name-label: ${{ secrets.DNS_NAME_LABEL }}
          ports: ${{ env.PORT }}
          location: ${{ env.LOCATION }}
          restart-policy: Always
          cpu: 1
          memory: 1
  
