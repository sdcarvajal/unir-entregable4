name: CI-CD Flask Docker to Azure ACR and ACI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: flask-entregable4
  CONTAINER_NAME: aci-flask-entregable4
  LOCATION: westeurope
  PORT: 5000

jobs:
  build-test-push-deploy:
    name: Build, test, push and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with pytest
        run: pytest -q

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Docker image
        run: |
          # Compilación local limpia para evitar conflictos de nomenclatura
          docker build -t flask-local:latest .

      - name: Run tests inside the Docker image
        run: |
          docker run --rm flask-local:latest python -m pytest -q

      - name: Run container smoke test
        run: |
          docker run -d --name flask-test -p 5000:5000 flask-local:latest
          sleep 5
          curl --fail http://localhost:5000/
          curl --fail http://localhost:5000/health
          docker logs flask-test
          docker stop flask-test
          docker rm flask-test

      - name: Push Docker image to Azure Container Registry
        env:
          RAW_LOGIN_SERVER: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          RAW_IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          # Sanitización del servidor de login quitando protocolos y fijando minúsculas
          CLEAN_SERVER=$(echo "$RAW_LOGIN_SERVER" | sed -e 's/https:\/\///g' -e 's/http:\/\///g' | tr -d '\r' | tr -d ' ' | tr '[:upper:]' '[:lower:]')
          IMAGE_LOWER=$(echo "$RAW_IMAGE_NAME" | tr -d '\r' | tr -d ' ' | tr '[:upper:]' '[:lower:]')

          IMAGE_SHA="${CLEAN_SERVER}/${IMAGE_LOWER}:${{ github.sha }}"
          IMAGE_LATEST="${CLEAN_SERVER}/${IMAGE_LOWER}:latest"

          docker tag flask-local:latest $IMAGE_SHA
          docker tag flask-local:latest $IMAGE_LATEST

          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST

          # Almacenamos el tag limpio en el entorno global de la ejecución
          echo "IMAGE_FINAL_TAG=$IMAGE_SHA" >> $GITHUB_ENV

      # =========================================================================
      # DESPLIEGUE SEGURO MEDIANTE ARM TEMPLATE (CON SUSCRIPTION ID)
      # =========================================================================
      - name: Deploy to Azure Container Instances via ARM Template
        uses: azure/arm-deploy@v2
        with:
          # Pasamos el ID de la suscripción para que localice correctamente el Resource Group
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.RESOURCE_GROUP }}
          template: |
            {
              "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
              "contentVersion": "1.0.0.0",
              "resources": [
                {
                  "type": "Microsoft.ContainerInstance/containerGroups",
                  "apiVersion": "2023-05-01",
                  "name": "${{ env.CONTAINER_NAME }}",
                  "location": "${{ env.LOCATION }}",
                  "properties": {
                    "containers": [
                      {
                        "name": "${{ env.CONTAINER_NAME }}",
                        "properties": {
                          "image": "${{ env.IMAGE_FINAL_TAG }}",
                          "ports": [
                            {
                              "port": ${{ env.PORT }},
                              "protocol": "TCP"
                            }
                          ],
                          "resources": {
                            "requests": {
                              "cpu": 1,
                              "memoryInGB": 1
                            }
                          }
                        }
                      }
                    ],
                    "imageRegistryCredentials": [
                      {
                        "server": "${{ secrets.REGISTRY_LOGIN_SERVER }}",
                        "username": "${{ secrets.REGISTRY_USERNAME }}",
                        "password": "${{ secrets.REGISTRY_PASSWORD }}"
                      }
                    ],
                    "osType": "Linux",
                    "restartPolicy": "Always",
                    "ipAddress": {
                      "type": "Public",
                      "ports": [
                        {
                          "port": ${{ env.PORT }},
                          "protocol": "TCP"
                        }
                      ],
                      "dnsNameLabel": "${{ secrets.DNS_NAME_LABEL }}"
                    }
                  }
                }
              ]
            }
