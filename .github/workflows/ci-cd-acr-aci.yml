name: CI-CD Flask Docker to Azure ACR and ACI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: flask-entregable4
  CONTAINER_NAME: aci-flask-entregable4
  LOCATION: westeurope
  PORT: 5000

jobs:
  build-test-push-deploy:
    name: Build, test, push and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with pytest
        run: pytest -q

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t flask-local:latest .

      - name: Run tests inside the Docker image
        run: |
          docker run --rm flask-local:latest python -m pytest -q

      - name: Run container smoke test
        run: |
          docker run -d --name flask-test -p 5000:5000 flask-local:latest
          sleep 5
          curl --fail http://localhost:5000/
          curl --fail http://localhost:5000/health
          docker logs flask-test
          docker stop flask-test
          docker rm flask-test

      - name: Push Docker image to Azure Container Registry
        env:
          RAW_LOGIN_SERVER: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          RAW_IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          CLEAN_SERVER=$(echo "$RAW_LOGIN_SERVER" | sed -e 's/https:\/\///g' -e 's/http:\/\///g' | tr -d '\r' | tr -d ' ' | tr '[:upper:]' '[:lower:]')
          IMAGE_LOWER=$(echo "$RAW_IMAGE_NAME" | tr -d '\r' | tr -d ' ' | tr '[:upper:]' '[:lower:]')

          IMAGE_SHA="${CLEAN_SERVER}/${IMAGE_LOWER}:${{ github.sha }}"
          IMAGE_LATEST="${CLEAN_SERVER}/${IMAGE_LOWER}:latest"

          docker tag flask-local:latest $IMAGE_SHA
          docker tag flask-local:latest $IMAGE_LATEST

          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST

          echo "IMAGE_FINAL_TAG=$IMAGE_SHA" >> $GITHUB_ENV

      # =========================================================================
      # DESPLIEGUE UTILIZANDO CONEXIÓN DIRECTA POR CLAVES DE ADMINISTRADOR DEL ACR
      # Autenticamos la Azure CLI usando los datos del propio registro
      # =========================================================================
      - name: Deploy to Azure Container Instances
        run: |
          # Intentamos el bypass inyectando directamente las credenciales del registro para la sesión de creación
          az container create \
            --resource-group "${{ secrets.RESOURCE_GROUP }}" \
            --name "${{ env.CONTAINER_NAME }}" \
            --image "${{ env.IMAGE_FINAL_TAG }}" \
            --registry-login-server "${{ secrets.REGISTRY_LOGIN_SERVER }}" \
            --registry-username "${{ secrets.REGISTRY_USERNAME }}" \
            --registry-password "${{ secrets.REGISTRY_PASSWORD }}" \
            --dns-name-label "${{ secrets.DNS_NAME_LABEL }}" \
            --ports "${{ env.PORT }}" \
            --location "${{ env.LOCATION }}" \
            --ip-address Public \
            --os-type Linux \
            --cpu 1 \
            --memory 1 \
            --restart-policy Always \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
